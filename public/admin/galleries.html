<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbit AI · Galleries</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: #f2f6fe;
      min-height: 100vh;
      color: #0b1a2b;
      display: flex;
      flex-direction: column;
    }

    /* ----- HEADER / NAVBAR ----- */
    .navbar {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.5);
      padding: 0 36px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.02);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #0c1e3e, #1a3b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    .nav-brand span {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 6px;
      list-style: none;
    }

    .nav-links a {
      display: block;
      padding: 8px 18px;
      border-radius: 40px;
      text-decoration: none;
      color: #2c3d52;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.15s;
      letter-spacing: -0.01em;
    }

    .nav-links a:hover {
      background: rgba(37,99,235,0.06);
      color: #1a3b6b;
    }

    .nav-links a.active {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      box-shadow: 0 4px 12px rgba(37,99,235,0.2);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid rgba(0,0,0,0.06);
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.85rem;
      color: #2c3d52;
      cursor: pointer;
      transition: all 0.15s;
      backdrop-filter: blur(4px);
      background: rgba(255,255,255,0.3);
      font-family: 'Inter', sans-serif;
    }

    .btn-logout:hover {
      background: rgba(239,68,68,0.06);
      border-color: #ef4444;
      color: #dc2626;
    }

    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }

    .nav-toggle span {
      display: block;
      width: 26px;
      height: 2.5px;
      background: #1e2a3a;
      border-radius: 4px;
      transition: 0.2s;
    }

    /* ----- MAIN CONTENT ----- */
    .main-wrap {
      flex: 1;
      max-width: 1280px;
      margin: 24px auto;
      width: 100%;
      padding: 0 36px;
    }

    .content-card {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 48px;
      padding: 32px 36px;
      box-shadow: 0 30px 60px -20px rgba(0, 20, 50, 0.25), 0 2px 10px rgba(0,0,0,0.02);
      border: 1px solid rgba(255,255,255,0.5);
    }

    .page-header {
      margin-bottom: 28px;
    }

    .page-header h1 {
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #0c1e3e, #1a3b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }

    .page-header p {
      color: #3b4a5e;
      font-size: 0.95rem;
      margin-top: 4px;
    }

    /* upload form */
    .upload-form {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 24px 28px;
      margin-bottom: 32px;
      border: 1px solid rgba(255,255,255,0.5);
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .form-row input,
    .form-row select {
      padding: 12px 16px;
      border-radius: 24px;
      border: 1px solid rgba(0,0,0,0.06);
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: all 0.15s;
      color: #0b1a2b;
      flex: 1;
      min-width: 160px;
    }

    .form-row input:focus,
    .form-row select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
      background: rgba(255,255,255,0.9);
    }

    .form-row input[type="file"] {
      padding: 10px 12px;
      flex: 0 1 auto;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 10px 20px -10px rgba(37,99,235,0.3);
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
    }

    .btn-primary:hover {
      transform: scale(1.02);
      box-shadow: 0 14px 28px -10px rgba(37,99,235,0.4);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    /* gallery grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 8px;
    }

    .gallery-item {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 24px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.7);
      transition: transform 0.15s;
      text-align: center;
    }

    .gallery-item:hover {
      transform: translateY(-4px);
    }

    .gallery-item img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 16px;
      background: #eef4f8;
    }

    .gallery-item .title {
      font-weight: 600;
      margin-top: 10px;
      font-size: 0.95rem;
    }

    .gallery-item .category {
      color: #5a6f88;
      font-size: 0.8rem;
      margin-top: 2px;
    }

    .empty-gallery {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: #5a6f88;
      background: rgba(255,255,255,0.3);
      border-radius: 28px;
    }

    /* ----- FOOTER ----- */
    .footer {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-top: 1px solid rgba(255,255,255,0.3);
      padding: 20px 36px;
      text-align: center;
      font-size: 0.8rem;
      color: #5a6f88;
      margin-top: auto;
    }

    .footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* ----- RESPONSIVE ----- */
    @media (max-width: 768px) {
      .navbar {
        padding: 0 20px;
        height: 64px;
        flex-wrap: wrap;
      }

      .nav-toggle {
        display: flex;
      }

      .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 64px;
        left: 0;
        right: 0;
        background: rgba(255,255,255,0.95);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        padding: 16px 20px;
        border-bottom: 1px solid rgba(0,0,0,0.04);
        gap: 4px;
      }

      .nav-links.open {
        display: flex;
      }

      .nav-links a {
        padding: 12px 16px;
        width: 100%;
        border-radius: 12px;
      }

      .main-wrap {
        padding: 0 16px;
        margin: 16px auto;
      }

      .content-card {
        padding: 20px 16px;
        border-radius: 32px;
      }

      .form-row {
        flex-direction: column;
        align-items: stretch;
      }

      .form-row input,
      .form-row select {
        min-width: auto;
      }

      .btn-primary {
        width: 100%;
        justify-content: center;
      }

      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 14px;
      }

      .footer {
        padding: 16px 20px;
      }
    }

    @media (max-width: 480px) {
      .navbar {
        padding: 0 12px;
      }
      .nav-brand {
        font-size: 1.1rem;
      }
      .btn-logout {
        padding: 6px 14px;
        font-size: 0.8rem;
      }
      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      }
      .gallery-item img {
        height: 140px;
      }
    }
  </style>
</head>
<body>
  <!-- ===== HEADER / NAVBAR ===== -->
  <header class="navbar">
    <a href="dashboard.html" class="nav-brand">Orbit<span>AI</span></a>

    <ul class="nav-links" id="navLinks">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="galleries.html" class="active">Galleries</a></li>
      <li><a href="event.html">Events</a></li>
      <li><a href="article.html">Articles</a></li>
      <li><a href="users.html">Users</a></li>
    </ul>

    <div class="nav-actions">
      <button class="btn-logout" id="logoutBtn">Sign out</button>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-wrap">
    <div class="content-card">
      <div class="page-header">
        <h1>Galleries</h1>
        <p>Manage gallery collections and images. Upload images with a title and category.</p>
      </div>

      <!-- Upload Form -->
      <form id="galleryForm" class="upload-form">
        <div class="form-row">
          <input type="text" id="imgTitle" placeholder="Image title" required />
          <select id="imgCategory">
            <option value="General">General</option>
            <option value="Product">Product</option>
            <option value="Event">Event</option>
            <option value="Team">Team</option>
            <option value="Nature">Nature</option>
            <option value="Tech">Tech</option>
          </select>
          <input type="file" id="imgFile" accept="image/*" required />
          <button class="btn-primary" type="submit">Upload</button>
        </div>
      </form>

      <!-- Gallery Grid -->
      <h3 style="font-weight:600;font-size:1.1rem;margin-bottom:16px;">Gallery Items</h3>
      <div class="gallery-grid" id="galleryGrid">
        <!-- items rendered by JS -->
      </div>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    &copy; 2025 <a href="#">Orbit AI</a> · All rights reserved · 
    <a href="#">Privacy</a> · <a href="#">Terms</a>
  </footer>

  <script>
    (function() {
      // ----- Mobile nav toggle -----
      const toggle = document.getElementById('navToggle');
      const navLinks = document.getElementById('navLinks');

      if (toggle && navLinks) {
        toggle.addEventListener('click', function(e) {
          e.stopPropagation();
          navLinks.classList.toggle('open');
        });

        document.addEventListener('click', function(e) {
          if (!e.target.closest('.navbar')) {
            navLinks.classList.remove('open');
          }
        });

        navLinks.querySelectorAll('a').forEach(link => {
          link.addEventListener('click', () => {
            navLinks.classList.remove('open');
          });
        });
      }

      // ----- Logout -----
      document.getElementById('logoutBtn').addEventListener('click', function() {
        window.location.href = 'login.html';
      });

      // ----- Gallery functions -----
      async function renderGallery() {
        const grid = document.getElementById('galleryGrid');
        grid.innerHTML = `<div class="empty-gallery">Loading gallery…</div>`;
        try {
          const apiBase = (window.location.protocol === 'file:'
            || window.location.hostname === '127.0.0.1'
            || window.location.hostname === 'localhost'
            || (window.location.port && window.location.port !== '4000')) ? 'http://localhost:4000' : '';

          const res = await fetch(`${apiBase}/api/galleries`);
          if (!res.ok) throw new Error('Failed to fetch');
          const items = await res.json();
          if (!Array.isArray(items) || items.length === 0) {
            grid.innerHTML = `<div class="empty-gallery">No gallery items yet. Upload your first image above!</div>`;
            return;
          }

          grid.innerHTML = items.map(item => `
            <div class="gallery-item" data-id="${escapeHtml(item.id)}">
              <img src="${escapeHtml(item.url)}" alt="${escapeHtml(item.title)}" />
              <div class="title">${escapeHtml(item.title)}</div>
              <div class="category">${escapeHtml(item.category)}</div>
              <div style="margin-top:10px;display:flex;gap:8px;justify-content:center;">
                <button class="icon-del" data-id="${escapeHtml(item.id)}" title="Delete" style="background:#fff;border:1px solid rgba(0,0,0,0.06);padding:8px 10px;border-radius:8px;cursor:pointer;color:#c02626">Delete</button>
              </div>
            </div>
          `).join('');
          // attach delete handlers
          document.querySelectorAll('.icon-del').forEach(b => b.addEventListener('click', () => deleteItem(b.getAttribute('data-id'))));
        } catch (err) {
          console.error('Render gallery failed', err);
          grid.innerHTML = `<div class="empty-gallery">Unable to load gallery.</div>`;
        }
      }

      function escapeHtml(text) {
        if (!text) return '';
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return String(text).replace(/[&<>"']/g, m => map[m]);
      }

      // ----- Handle upload -----
      const form = document.getElementById('galleryForm');
      form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const title = document.getElementById('imgTitle').value.trim();
        const category = document.getElementById('imgCategory').value;
        const file = document.getElementById('imgFile').files[0];

        if (!title) { alert('Please enter an image title.'); return; }
        if (!file) { alert('Please choose an image file.'); return; }

        // read file as data URL and send to backend upload endpoint
        const reader = new FileReader();
        reader.onload = async function() {
          try {
            const dataUrl = reader.result;
            const apiBase = (window.location.protocol === 'file:'
              || window.location.hostname === '127.0.0.1'
              || window.location.hostname === 'localhost'
              || (window.location.port && window.location.port !== '4000')) ? 'http://localhost:4000' : '';

            // upload image to backend which forwards to imgbb
            const upRes = await fetch(`${apiBase}/api/upload-image`, {
              method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ image: dataUrl, name: title })
            });
            if (!upRes.ok) {
              const txt = await upRes.text(); console.error('Upload failed', txt); throw new Error('Upload failed');
            }
            const upBody = await upRes.json();

            // save gallery record
            const saveRes = await fetch(`${apiBase}/api/galleries`, {
              method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ title, category, url: upBody.url, thumb: upBody.thumb })
            });
            if (!saveRes.ok) { const txt = await saveRes.text(); console.error('Save failed', txt); throw new Error('Save failed'); }

            form.reset();
            await renderGallery();
            alert('Image uploaded and saved.');
          } catch (err) {
            console.error('Upload flow failed', err);
            alert('Upload failed. Check console for details.');
          }
        };
        reader.readAsDataURL(file);
      });

        // delete gallery item
        async function deleteItem(id) {
          if (!confirm('Delete this gallery item?')) return;
          try {
            const apiBase = (window.location.protocol === 'file:'
              || window.location.hostname === '127.0.0.1'
              || window.location.hostname === 'localhost'
              || (window.location.port && window.location.port !== '4000')) ? 'http://localhost:4000' : '';
            const res = await fetch(`${apiBase}/api/galleries/${encodeURIComponent(id)}`, { method: 'DELETE' });
            if (!res.ok) { const t = await res.text(); console.error('Delete failed', t); throw new Error('Delete failed'); }
            await renderGallery();
            alert('Gallery item deleted.');
          } catch (err) {
            console.error('Delete gallery failed', err);
            alert('Unable to delete gallery item.');
          }
        }

      // ----- Initial render -----
      renderGallery();

      // Highlight active nav link
      const currentPage = window.location.pathname.split('/').pop() || 'galleries.html';
      document.querySelectorAll('.nav-links a').forEach(link => {
        if (link.getAttribute('href') === currentPage) {
          link.classList.add('active');
        } else {
          link.classList.remove('active');
        }
      });
    })();
  </script>
</body>
</html>
