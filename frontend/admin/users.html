<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbit AI · Users</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: #f2f6fe;
      min-height: 100vh;
      color: #0b1a2b;
      display: flex;
      flex-direction: column;
    }

    /* ----- HEADER / NAVBAR ----- */
    .navbar {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.5);
      padding: 0 36px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.02);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #0c1e3e, #1a3b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    .nav-brand span {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 6px;
      list-style: none;
    }

    .nav-links a {
      display: block;
      padding: 8px 18px;
      border-radius: 40px;
      text-decoration: none;
      color: #2c3d52;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.15s;
      letter-spacing: -0.01em;
    }

    .nav-links a:hover {
      background: rgba(37,99,235,0.06);
      color: #1a3b6b;
    }

    .nav-links a.active {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      box-shadow: 0 4px 12px rgba(37,99,235,0.2);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid rgba(0,0,0,0.06);
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.85rem;
      color: #2c3d52;
      cursor: pointer;
      transition: all 0.15s;
      backdrop-filter: blur(4px);
      background: rgba(255,255,255,0.3);
      font-family: 'Inter', sans-serif;
    }

    .btn-logout:hover {
      background: rgba(239,68,68,0.06);
      border-color: #ef4444;
      color: #dc2626;
    }

    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
    }

    .nav-toggle span {
      display: block;
      width: 26px;
      height: 2.5px;
      background: #1e2a3a;
      border-radius: 4px;
      transition: 0.2s;
    }

    /* ----- MAIN CONTENT ----- */
    .main-wrap {
      flex: 1;
      max-width: 1280px;
      margin: 24px auto;
      width: 100%;
      padding: 0 36px;
    }

    .content-card {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 48px;
      padding: 32px 36px;
      box-shadow: 0 30px 60px -20px rgba(0, 20, 50, 0.25), 0 2px 10px rgba(0,0,0,0.02);
      border: 1px solid rgba(255,255,255,0.5);
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
    }

    .page-header h1 {
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #0c1e3e, #1a3b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }

    .page-header p {
      color: #3b4a5e;
      font-size: 0.95rem;
      margin-top: 2px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* ----- USER FORM (modal style) ----- */
    .user-form {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 28px;
      padding: 24px 28px;
      margin-bottom: 28px;
      border: 1px solid rgba(255,255,255,0.5);
      display: none;
    }

    .user-form.visible {
      display: block;
    }

    .user-form .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .user-form .form-group {
      flex: 1;
      min-width: 160px;
    }

    .user-form .form-group label {
      display: block;
      font-weight: 500;
      font-size: 0.85rem;
      color: #2c3d52;
      margin-bottom: 6px;
    }

    .user-form .form-group input,
    .user-form .form-group select {
      width: 100%;
      padding: 12px 16px;
      border-radius: 24px;
      border: 1px solid rgba(0,0,0,0.06);
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: all 0.15s;
      color: #0b1a2b;
    }

    .user-form .form-group input:focus,
    .user-form .form-group select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
      background: rgba(255,255,255,0.9);
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 6px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border: none;
      padding: 12px 32px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 10px 20px -10px rgba(37,99,235,0.3);
      font-family: 'Inter', sans-serif;
    }

    .btn-primary:hover {
      transform: scale(1.02);
      box-shadow: 0 14px 28px -10px rgba(37,99,235,0.4);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.06);
      padding: 12px 32px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.9rem;
      color: #2c3d52;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .btn-secondary:hover {
      background: rgba(0,0,0,0.08);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(37,99,235,0.2);
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.85rem;
      color: #2563eb;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .btn-outline:hover {
      background: rgba(37,99,235,0.06);
      border-color: #2563eb;
    }

    .btn-danger {
      background: transparent;
      border: 1px solid rgba(239,68,68,0.2);
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.8rem;
      color: #dc2626;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .btn-danger:hover {
      background: rgba(239,68,68,0.06);
      border-color: #ef4444;
    }

    /* ----- USER TABLE ----- */
    .table-wrap {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 28px;
      overflow: auto;
      border: 1px solid rgba(255,255,255,0.5);
      padding: 4px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      text-align: left;
      padding: 18px 20px;
      font-weight: 600;
      color: #1e2a3a;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      letter-spacing: 0.01em;
      background: rgba(255,255,255,0.3);
    }

    td {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(0,0,0,0.03);
      color: #1e2a3a;
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .user-name {
      font-weight: 600;
    }

    .user-email {
      color: #5a6f88;
      font-size: 0.85rem;
    }

    .role-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.75rem;
      letter-spacing: 0.02em;
      background: rgba(37,99,235,0.08);
      color: #2563eb;
    }

    .role-badge.admin {
      background: rgba(124,58,237,0.08);
      color: #7c3aed;
    }

    .role-badge.editor {
      background: rgba(5,150,105,0.08);
      color: #059669;
    }

    .role-badge.viewer {
      background: rgba(107,114,128,0.08);
      color: #6b7280;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty-users {
      text-align: center;
      padding: 60px 20px;
      color: #5a6f88;
      background: rgba(255,255,255,0.3);
      border-radius: 28px;
    }

    /* ----- FOOTER ----- */
    .footer {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-top: 1px solid rgba(255,255,255,0.3);
      padding: 20px 36px;
      text-align: center;
      font-size: 0.8rem;
      color: #5a6f88;
      margin-top: auto;
    }

    .footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* ----- RESPONSIVE ----- */
    @media (max-width: 768px) {
      .navbar {
        padding: 0 20px;
        height: 64px;
        flex-wrap: wrap;
      }

      .nav-toggle {
        display: flex;
      }

      .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 64px;
        left: 0;
        right: 0;
        background: rgba(255,255,255,0.95);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        padding: 16px 20px;
        border-bottom: 1px solid rgba(0,0,0,0.04);
        gap: 4px;
      }

      .nav-links.open {
        display: flex;
      }

      .nav-links a {
        padding: 12px 16px;
        width: 100%;
        border-radius: 12px;
      }

      .main-wrap {
        padding: 0 16px;
        margin: 16px auto;
      }

      .content-card {
        padding: 20px 16px;
        border-radius: 32px;
      }

      .page-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .user-form .form-row {
        flex-direction: column;
      }

      .user-form .form-group {
        min-width: auto;
      }

      .form-actions {
        flex-direction: column;
      }

      .btn-primary,
      .btn-secondary {
        width: 100%;
        justify-content: center;
        text-align: center;
      }

      .user-info {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }

      .action-buttons {
        flex-direction: column;
        align-items: flex-start;
      }

      .footer {
        padding: 16px 20px;
      }
    }

    @media (max-width: 480px) {
      .navbar {
        padding: 0 12px;
      }
      .nav-brand {
        font-size: 1.1rem;
      }
      .btn-logout {
        padding: 6px 14px;
        font-size: 0.8rem;
      }
      td {
        padding: 12px 14px;
      }
      th {
        padding: 12px 14px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <!-- ===== HEADER / NAVBAR ===== -->
  <header class="navbar">
    <a href="dashboard.html" class="nav-brand">Orbit<span>AI</span></a>

    <ul class="nav-links" id="navLinks">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="galleries.html">Galleries</a></li>
      <li><a href="event.html">Events</a></li>
      <li><a href="article.html">Articles</a></li>
      <li><a href="users.html" class="active">Users</a></li>
    </ul>

    <div class="nav-actions">
      <button class="btn-logout" id="logoutBtn">Sign out</button>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-wrap">
    <div class="content-card">
      <div class="page-header">
        <div>
          <h1>Users</h1>
          <p>Manage admin and system users: add, edit, or remove access.</p>
        </div>
        <div class="header-actions">
          <button class="btn-outline" id="showAddUserBtn">+ Add User</button>
        </div>
      </div>

      <!-- Add/Edit User Form -->
      <div class="user-form" id="userForm">
        <h4 style="font-weight:600;margin-bottom:16px;" id="formTitle">Add New User</h4>
        <form id="userFormInner">
          <input type="hidden" id="editUserId" value="" />
          <div class="form-row">
            <div class="form-group">
              <label for="userName">Full Name *</label>
              <input type="text" id="userName" placeholder="e.g., John Doe" required />
            </div>
            <div class="form-group">
              <label for="userEmail">Email *</label>
              <input type="email" id="userEmail" placeholder="john@example.com" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="userRole">Role</label>
              <select id="userRole">
                <option value="Administrator">Administrator</option>
                <option value="Editor">Editor</option>
                <option value="Viewer">Viewer</option>
              </select>
            </div>
            <div class="form-group">
              <label for="userStatus">Status</label>
              <select id="userStatus">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn-primary" type="submit">Save User</button>
            <button class="btn-secondary" type="button" id="cancelUserBtn">Cancel</button>
          </div>
        </form>
      </div>

      <!-- User Table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Role</th>
              <th>Status</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <!-- rendered by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    &copy; 2025 <a href="#">Orbit AI</a> · All rights reserved · 
    <a href="#">Privacy</a> · <a href="#">Terms</a>
  </footer>

  <script>
    (function() {
      // ----- Mobile nav toggle -----
      const toggle = document.getElementById('navToggle');
      const navLinks = document.getElementById('navLinks');

      if (toggle && navLinks) {
        toggle.addEventListener('click', function(e) {
          e.stopPropagation();
          navLinks.classList.toggle('open');
        });

        document.addEventListener('click', function(e) {
          if (!e.target.closest('.navbar')) {
            navLinks.classList.remove('open');
          }
        });

        navLinks.querySelectorAll('a').forEach(link => {
          link.addEventListener('click', () => {
            navLinks.classList.remove('open');
          });
        });
      }

      // ----- Logout -----
      document.getElementById('logoutBtn').addEventListener('click', function() {
        window.location.href = 'login.html';
      });

      // ----- User functions (API-backed) -----
      const apiBase = (function() {
        const host = location.hostname;
        if (host === '127.0.0.1' || host === 'localhost') return 'http://localhost:4000';
        return 'https://pd-website-mobq-pi.vercel.app';
      })();

      async function fetchUsers() {
        try {
          const res = await fetch(apiBase + '/api/users');
          if (!res.ok) throw new Error('Failed to load users');
          const data = await res.json();
          return Array.isArray(data) ? data : [];
        } catch (err) {
          console.warn('Fetch users failed, falling back to local seed', err);
          return [];
        }
      }

      function renderUsers(users) {
        const tbody = document.getElementById('userTableBody');
        if (!users || users.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" class="empty-users">No users found. Add your first user!</td></tr>`;
          return;
        }

        tbody.innerHTML = users.map(user => {
          const name = user.displayName || user.name || user.username || '';
          const email = user.email || ''; 
          const joined = (user.createdAt && user.createdAt.seconds) ? new Date(user.createdAt.seconds * 1000).toISOString().split('T')[0] : (user.createdAt || '—');
          const initials = name.split(' ').map(n => n[0] || '').join('').toUpperCase() || (email[0] || 'U').toUpperCase();
          const role = user.role || (user.provider === 'firebase' ? 'Administrator' : 'Viewer');
          const status = user.status || (user.disabled ? 'Inactive' : 'Active');
          const uid = user.uid || user.id || '';
          const roleClass = role === 'Administrator' ? 'admin' : role === 'Editor' ? 'editor' : 'viewer';
          const statusClass = status === 'Active' ? 'published' : 'draft';

          return `
            <tr>
              <td>
                <div class="user-info">
                  <div class="user-avatar">${initials}</div>
                  <div>
                    <div class="user-name">${escapeHtml(name)}</div>
                    <div class="user-email">${escapeHtml(email)}</div>
                  </div>
                </div>
              </td>
              <td><span class="role-badge ${roleClass}">${escapeHtml(role)}</span></td>
              <td><span class="article-status ${statusClass}">${escapeHtml(status)}</span></td>
              <td style="color:#5a6f88;font-size:0.85rem;">${escapeHtml(joined)}</td>
              <td>
                <div class="action-buttons">
                  <button class="btn-secondary" style="padding:4px 14px;font-size:0.8rem;" onclick="startEditUser('${uid}')">Edit</button>
                  <button class="btn-danger" onclick="removeUser('${uid}')">Remove</button>
                </div>
              </td>
            </tr>
          `;
        }).join('');
      }

      function escapeHtml(text) {
        if (!text) return '';
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return String(text).replace(/[&<>"']/g, m => map[m]);
      }

      // ----- User CRUD operations -----
      window.startEditUser = function(uid) {
        // load user profile from API (or from list) and open form
        (async () => {
          try {
            const res = await fetch(apiBase + '/api/users');
            const list = await res.json();
            const user = (list || []).find(u => (u.uid || u.id) === uid);
            if (!user) return alert('User not found');

            document.getElementById('editUserId').value = uid;
            document.getElementById('userName').value = user.displayName || user.name || user.username || '';
            document.getElementById('userEmail').value = user.email || '';
            document.getElementById('userRole').value = user.role || 'Viewer';
            document.getElementById('userStatus').value = (user.disabled ? 'Inactive' : (user.status || 'Active'));
            document.getElementById('formTitle').textContent = 'Edit User';
            document.getElementById('userForm').classList.add('visible');
            document.getElementById('userForm').scrollIntoView({ behavior: 'smooth', block: 'center' });
          } catch (err) {
            console.warn('Start edit user failed', err);
          }
        })();
      };

      window.removeUser = function(uid) {
        if (!uid) return alert('Invalid user id');
        if (!confirm('Are you sure you want to remove this user?')) return;
        (async () => {
          try {
            const res = await fetch(apiBase + '/api/users/' + encodeURIComponent(uid), { method: 'DELETE' });
            if (!res.ok) throw new Error('Delete failed');
            await loadAndRender();
          } catch (err) {
            alert('Failed to delete user. See console.');
            console.error(err);
          }
        })();
      };

      // ----- Form handlers -----
      const form = document.getElementById('userFormInner');
      const showBtn = document.getElementById('showAddUserBtn');
      const cancelBtn = document.getElementById('cancelUserBtn');

      showBtn.addEventListener('click', function() {
        document.getElementById('editUserId').value = '';
        document.getElementById('userName').value = '';
        document.getElementById('userEmail').value = '';
        document.getElementById('userRole').value = 'Viewer';
        document.getElementById('userStatus').value = 'Active';
        document.getElementById('formTitle').textContent = 'Add New User';
        document.getElementById('userForm').classList.add('visible');
        document.getElementById('userForm').scrollIntoView({ behavior: 'smooth', block: 'center' });
      });

      cancelBtn.addEventListener('click', function() {
        document.getElementById('userForm').classList.remove('visible');
      });

      form.addEventListener('submit', function(e) {
        e.preventDefault();

        const id = document.getElementById('editUserId').value;
        const name = document.getElementById('userName').value.trim();
        const email = document.getElementById('userEmail').value.trim();
        const role = document.getElementById('userRole').value;
        const status = document.getElementById('userStatus').value;

        if (!name || !email) {
          alert('Please fill in all required fields.');
          return;
        }

        if (!email.includes('@') || !email.includes('.')) {
          alert('Please enter a valid email address.');
          return;
        }

        (async () => {
          try {
            if (id) {
              // update
              const uid = id;
              const payload = { name, email, role, status, disabled: status !== 'Active' };
              const res = await fetch(apiBase + '/api/users/' + encodeURIComponent(uid), {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
              });
              if (!res.ok) throw new Error('Update failed');
            } else {
              // create
              const payload = { name, email, role, status };
              const res = await fetch(apiBase + '/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
              });
              if (!res.ok) throw new Error('Create failed');
            }
            document.getElementById('userForm').classList.remove('visible');
            form.reset();
            await loadAndRender();
          } catch (err) {
            alert('Failed to save user. See console.');
            console.error(err);
          }
        })();
      });

      // ----- Initial render -----
      async function loadAndRender() {
        const users = await fetchUsers();
        if (users && users.length > 0) {
          renderUsers(users);
        } else {
          // fallback seed display
          renderUsers([]);
        }
      }
      loadAndRender();

      // Highlight active nav link
      const currentPage = window.location.pathname.split('/').pop() || 'users.html';
      document.querySelectorAll('.nav-links a').forEach(link => {
        if (link.getAttribute('href') === currentPage) {
          link.classList.add('active');
        } else {
          link.classList.remove('active');
        }
      });
    })();
  </script>
</body>
</html>
